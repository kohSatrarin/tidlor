appId: com.smartcare.app
---
# Login Flow E2E Test

- launchApp:
    clearState: true

# 1. Verify we land on the login screen
- assertVisible: "Smart Care System"
- assertVisible: "Sign in to continue"

# 2. Enter invalid input (non-numeric) and try to tap login
- tapOn:
    id: "credential-input"
- inputText: "123abc"
# Tapping the disabled button should not navigate away
- tapOn:
    id: "login-button"
- assertVisible: "Smart Care System"

# 3. Clear and enter 9-digit input (too short) — still on login
- tapOn:
    id: "credential-input"
- eraseText: 20
- inputText: "123456789"
- tapOn:
    id: "login-button"
- assertVisible: "Smart Care System"

# 4. Enter valid 13-digit National ID and submit
- tapOn:
    id: "credential-input"
- eraseText: 20
- inputText: "1234567890123"
- tapOn:
    id: "login-button"

# 5. Loading state briefly visible, then navigates to Main
- waitForAnimationToEnd
- assertVisible: "Smart Care"
- assertNotVisible: "Smart Care System"

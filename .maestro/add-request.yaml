appId: com.smartcare.app
---
# Add Request Flow E2E Test
# Precondition: user is already logged in (persisted auth)

- launchApp

# Verify on Main screen
- assertVisible: "Smart Care"

# 1. Tap the Add (+) button
- tapOn:
    id: "add-button"

# 2. Verify we are on the Add Request screen
- assertVisible: "New Request"

# 3. Tapping submit with empty fields — should stay on Add Request screen
- tapOn:
    id: "submit-button"
- assertVisible: "New Request"

# 4. Fill in the title field only — still incomplete
- tapOn:
    id: "title-input"
- inputText: "Broken projector in Conference Room B"
- tapOn:
    id: "submit-button"
- assertVisible: "New Request"

# 5. Fill in the description field
- tapOn:
    id: "description-input"
- inputText: "The projector in Conference Room B stopped working during today's presentation."

# 6. Now both fields filled — tap submit
- tapOn:
    id: "submit-button"

# 7. Should navigate back to Main screen
- assertVisible: "Smart Care"

# 8. New request card should appear at the top of the list
- assertVisible: "Broken projector in Conference Room B"

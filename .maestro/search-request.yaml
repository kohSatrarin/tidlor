appId: com.smartcare.app
---
# Search Request Flow E2E Test
# Precondition: user is logged in, seed data loaded

- launchApp

# Verify on Main screen with seed data
- assertVisible: "Smart Care"
- assertVisible: "Air conditioning not working in Room 301"

# --- Scenario 1: Search with non-existent ID ---
- tapOn:
    id: "main-search-input"
- inputText: "sc-does-not-exist"
- tapOn:
    id: "main-search-button"

# Should show inline error, stay on Main screen
- assertVisible:
    id: "search-error"
- assertVisible: "Smart Care"

# --- Scenario 2: Search with valid seeded ID ---
- clearText:
    id: "main-search-input"
- tapOn:
    id: "main-search-input"
- inputText: "sc-seed-003"
- tapOn:
    id: "main-search-button"

# Should navigate to Request Detail
- waitForAnimationToEnd
- assertVisible: "Request Detail"
- assertVisible: "sc-seed-003"
